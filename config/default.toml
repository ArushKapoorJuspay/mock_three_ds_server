# Default configuration for 3DS Mock Server

[server]
host = "127.0.0.1"
port = 8080
log_level = "info"

[redis]
url = "redis://127.0.0.1:6379"
ttl_seconds = 1800
key_prefix = "3ds_transaction"

[redis.connection]
timeout_ms = 5000
max_retries = 3
retry_delay_ms = 1000

[redis.pool]
max_size = 10
min_idle = 2
connection_timeout_seconds = 10
idle_timeout_seconds = 300
